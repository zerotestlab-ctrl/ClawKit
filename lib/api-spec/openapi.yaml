openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ClawKit API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: waitlist
    description: Waitlist management
  - name: products
    description: Product management
  - name: clawkit
    description: ClawKit generation
  - name: analytics
    description: Analytics
  - name: subscriptions
    description: Subscription management
  - name: settings
    description: User settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join waitlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistRequest"
      responses:
        "201":
          description: Joined waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistResponse"
        "409":
          description: Already on waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List user products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /products/{id}/generate:
    post:
      operationId: generateClawKit
      tags: [clawkit]
      summary: Generate ClawKit artifacts for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ClawKit generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClawKitGenerationResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}/simulate:
    post:
      operationId: simulateDistribution
      tags: [analytics]
      summary: Simulate agent distribution for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResult"

  /products/{id}/export:
    get:
      operationId: exportProductData
      tags: [products]
      summary: Export all product data as JSON
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductExport"

  /analytics/dashboard:
    get:
      operationId: getDashboardAnalytics
      tags: [analytics]
      summary: Get dashboard analytics
      responses:
        "200":
          description: Dashboard analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardAnalytics"

  /analytics/invocations:
    get:
      operationId: getInvocations
      tags: [analytics]
      summary: Get agent invocations timeline
      responses:
        "200":
          description: Invocations list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvocationList"

  /subscriptions/current:
    get:
      operationId: getCurrentSubscription
      tags: [subscriptions]
      summary: Get current subscription
      responses:
        "200":
          description: Current subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/upgrade:
    post:
      operationId: upgradeSubscription
      tags: [subscriptions]
      summary: Upgrade subscription after Paystack payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradeRequest"
      responses:
        "200":
          description: Subscription upgraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/cancel:
    post:
      operationId: cancelSubscription
      tags: [subscriptions]
      summary: Cancel subscription
      responses:
        "200":
          description: Subscription cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get user settings
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsRequest"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    WaitlistRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
      required: [email]

    WaitlistResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        position:
          type: integer
        message:
          type: string
      required: [id, email, position, message]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
      required: [email, password, name]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user, message]

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        plan:
          type: string
          enum: [free, growth, scale]
        createdAt:
          type: string
          format: date-time
      required: [id, email, name, plan, createdAt]

    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        apiSpecUrl:
          type: string
        apiSpecContent:
          type: string
        websiteUrl:
          type: string
      required: [name, description]

    Product:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        description:
          type: string
        apiSpecUrl:
          type: string
        apiSpecContent:
          type: string
        websiteUrl:
          type: string
        mcpManifest:
          type: string
        agentsMd:
          type: string
        chatgptSubmission:
          type: string
        claudeSubmission:
          type: string
        moltbookVariant:
          type: string
        safetyScore:
          type: integer
        safetyReport:
          type: string
        generated:
          type: boolean
        invocations:
          type: integer
        revenue:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, name, description, generated, invocations, revenue, createdAt, updatedAt]

    ProductList:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
      required: [products, total]

    ClawKitGenerationResult:
      type: object
      properties:
        product:
          $ref: "#/components/schemas/Product"
        mcpManifest:
          type: string
        agentsMd:
          type: string
        chatgptSubmission:
          type: string
        claudeSubmission:
          type: string
        moltbookVariant:
          type: string
        safetyScore:
          type: integer
        safetyIssues:
          type: array
          items:
            $ref: "#/components/schemas/SafetyIssue"
        safetyReport:
          type: string
      required: [product, mcpManifest, agentsMd, chatgptSubmission, claudeSubmission, moltbookVariant, safetyScore, safetyIssues, safetyReport]

    SafetyIssue:
      type: object
      properties:
        severity:
          type: string
          enum: [critical, warning, info]
        category:
          type: string
        description:
          type: string
        fix:
          type: string
      required: [severity, category, description, fix]

    SimulationResult:
      type: object
      properties:
        productId:
          type: string
        invocations:
          type: array
          items:
            $ref: "#/components/schemas/AgentInvocation"
        totalInvocations:
          type: integer
        projectedRevenue:
          type: number
        projectedMonthlyRevenue:
          type: number
      required: [productId, invocations, totalInvocations, projectedRevenue, projectedMonthlyRevenue]

    AgentInvocation:
      type: object
      properties:
        id:
          type: string
        platform:
          type: string
          enum: [chatgpt, claude, grok, moltbook]
        agentName:
          type: string
        timestamp:
          type: string
          format: date-time
        query:
          type: string
        response:
          type: string
        revenueImpact:
          type: number
      required: [id, platform, agentName, timestamp, query, response, revenueImpact]

    DashboardAnalytics:
      type: object
      properties:
        totalProducts:
          type: integer
        totalInvocations:
          type: integer
        totalRevenue:
          type: number
        weeklyInvocations:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"
        topProducts:
          type: array
          items:
            $ref: "#/components/schemas/ProductMetric"
        platformBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/PlatformMetric"
      required: [totalProducts, totalInvocations, totalRevenue, weeklyInvocations, topProducts, platformBreakdown]

    DailyMetric:
      type: object
      properties:
        date:
          type: string
        invocations:
          type: integer
        revenue:
          type: number
      required: [date, invocations, revenue]

    ProductMetric:
      type: object
      properties:
        productId:
          type: string
        name:
          type: string
        invocations:
          type: integer
        revenue:
          type: number
      required: [productId, name, invocations, revenue]

    PlatformMetric:
      type: object
      properties:
        platform:
          type: string
        invocations:
          type: integer
        percentage:
          type: number
      required: [platform, invocations, percentage]

    InvocationList:
      type: object
      properties:
        invocations:
          type: array
          items:
            $ref: "#/components/schemas/AgentInvocation"
        total:
          type: integer
      required: [invocations, total]

    Subscription:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        plan:
          type: string
          enum: [free, growth, scale]
        status:
          type: string
          enum: [active, cancelled, trialing, expired]
        paystackSubscriptionCode:
          type: string
        trialEndsAt:
          type: string
          format: date-time
        currentPeriodEnd:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, userId, plan, status, createdAt]

    UpgradeRequest:
      type: object
      properties:
        plan:
          type: string
          enum: [growth, scale]
        paystackReference:
          type: string
        paystackEmail:
          type: string
      required: [plan, paystackReference, paystackEmail]

    UserSettings:
      type: object
      properties:
        userId:
          type: string
        grokApiKeySet:
          type: boolean
        emailNotifications:
          type: boolean
        plan:
          type: string
          enum: [free, growth, scale]
      required: [userId, grokApiKeySet, emailNotifications, plan]

    UpdateSettingsRequest:
      type: object
      properties:
        grokApiKey:
          type: string
        emailNotifications:
          type: boolean

    ProductExport:
      type: object
      properties:
        product:
          $ref: "#/components/schemas/Product"
        mcpManifest:
          type: string
        agentsMd:
          type: string
        chatgptSubmission:
          type: string
        claudeSubmission:
          type: string
        moltbookVariant:
          type: string
        safetyReport:
          type: string
        exportedAt:
          type: string
          format: date-time
      required: [product, exportedAt]
